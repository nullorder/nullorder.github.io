<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Null Order</title>
    <meta name="description" content="An open community for the curious." />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="nullorder.png" />
    <meta property="og:title" content="Null Order" />
    <meta
      property="og:description"
      content="An open community for the curious."
    />
    <meta property="og:image" content="og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Null Order" />
    <meta
      name="twitter:description"
      content="An open community for the curious."
    />
    <meta name="twitter:image" content="og-image.png" />
    <link
      rel="preload"
      href="fonts/Pixelspace-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <style>
      @font-face {
        font-family: "Pixelspace";
        src: url("fonts/Pixelspace-Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: "Pixelspace", monospace;
        color: #fff;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      a.x {
        position: fixed;
        left: 50%;
        top: 78%;
        transform: translate(-50%, -50%);
        color: #fff;
        text-decoration: none;
        font-size: 40px;
        font-family: "Pixelspace", monospace;
        z-index: 1;
        opacity: 0;
        transition: opacity 0.8s ease;
      }
      a.x.show {
        opacity: 1;
      }
      a.x:hover {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <a class="x" href="https://x.com/orderofnull" target="_blank" rel="noopener"
      >𝕏</a
    >
    <script>
      (() => {
        const c = document.getElementById("c");
        const ctx = c.getContext("2d");
        const off = document.createElement("canvas");
        const offCtx = off.getContext("2d", { willReadFrequently: true });
        const TITLE = "NULLORDER";
        const TAGLINE = "An Open Guild";
        const CELL = 14; // css px per pixel-cell (each "box" of the letter)
        const BLOCK_RATIO = 0.78; // visible box is BLOCK_RATIO * CELL, rest is gap
        const FLICKER_MIN = 60; // ms between random flickers
        const FLICKER_MAX = 180;
        const SETTLE_START = 1100; // ms after load before cells start locking in
        const SETTLE_DURATION = 4200;
        const TITLE_TAGLINE_GAP = 4; // empty pixel-rows between title and tagline
        const LINE_GAP = 2; // empty pixel-rows between wrapped tagline lines
        const xLink = document.querySelector("a.x");
        let W, H, cols, rows, cells, originX, originY, t0, xShown;

        // Render `text` in Pixelspace at its native 7-px grid into the offscreen
        // canvas, then read pixels back as a tight 0/1 bitmap.
        function sample(text) {
          const SIZE = 7; // native grid height
          const PAD = 2;
          offCtx.font = SIZE + "px 'Pixelspace', monospace";
          const m = offCtx.measureText(text);
          const pw = Math.ceil(m.width) + PAD * 2;
          const ph = SIZE * 2 + PAD * 2;
          off.width = pw;
          off.height = ph;
          offCtx.fillStyle = "#000";
          offCtx.fillRect(0, 0, pw, ph);
          offCtx.fillStyle = "#fff";
          offCtx.font = SIZE + "px 'Pixelspace', monospace";
          offCtx.textBaseline = "top";
          offCtx.fillText(text, PAD, PAD);
          const data = offCtx.getImageData(0, 0, pw, ph).data;
          let minX = pw,
            maxX = -1,
            minY = ph,
            maxY = -1;
          for (let y = 0; y < ph; y++) {
            for (let x = 0; x < pw; x++) {
              if (data[(y * pw + x) * 4] > 96) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
              }
            }
          }
          if (maxX < 0) return { w: 0, h: 0, bits: [] };
          const w = maxX - minX + 1,
            h = maxY - minY + 1;
          const bits = new Uint8Array(w * h);
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              bits[y * w + x] =
                data[((y + minY) * pw + (x + minX)) * 4] > 96 ? 1 : 0;
            }
          }
          return { w, h, bits };
        }

        function wrap(text, maxW) {
          const words = text.split(" ");
          const lines = [];
          let cur = "";
          for (const word of words) {
            const trial = cur ? cur + " " + word : word;
            if (sample(trial).w > maxW && cur) {
              lines.push(cur);
              cur = word;
            } else {
              cur = trial;
            }
          }
          if (cur) lines.push(cur);
          return lines;
        }

        function stamp(targets, bm, row, cols) {
          const startCol = Math.floor((cols - bm.w) / 2);
          for (let y = 0; y < bm.h; y++) {
            for (let x = 0; x < bm.w; x++) {
              if (bm.bits[y * bm.w + x]) {
                targets.add((row + y) * cols + (startCol + x));
              }
            }
          }
        }

        function init() {
          const dpr = devicePixelRatio || 1;
          W = innerWidth;
          H = innerHeight;
          c.width = W * dpr;
          c.height = H * dpr;
          c.style.width = W + "px";
          c.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          cols = Math.floor(W / CELL);
          rows = Math.floor(H / CELL);
          originX = (W - cols * CELL) / 2;
          originY = (H - rows * CELL) / 2;

          const targets = new Set();
          const title = sample(TITLE);
          const taglineMaxW = Math.max(20, cols - 6);
          const lines = wrap(TAGLINE, taglineMaxW).map(sample);

          // Vertically center the whole title+tagline block around 45% from top.
          const totalH =
            title.h +
            TITLE_TAGLINE_GAP +
            lines.reduce((s, l, i) => s + l.h + (i ? LINE_GAP : 0), 0);
          let row = Math.max(0, Math.floor(rows * 0.45 - totalH / 2));
          stamp(targets, title, row, cols);
          row += title.h + TITLE_TAGLINE_GAP;
          for (let i = 0; i < lines.length; i++) {
            stamp(targets, lines[i], row, cols);
            row += lines[i].h + LINE_GAP;
          }

          cells = new Array(cols * rows);
          for (let i = 0; i < cells.length; i++) {
            const isTarget = targets.has(i);
            cells[i] = {
              on: Math.random() < 0.5,
              nextFlip: 200 + Math.random() * 1400,
              isTarget,
              settleAt: SETTLE_START + Math.random() * SETTLE_DURATION,
              settled: false,
            };
          }
          t0 = performance.now();
          xShown = false;
          if (xLink) xLink.classList.remove("show");
        }

        function frame(now) {
          ctx.fillStyle = "#000";
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = "#fff";

          const elapsed = now - t0;
          const block = Math.floor(CELL * BLOCK_RATIO);
          const inset = Math.floor((CELL - block) / 2);
          let allSettled = true;
          for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
              const cc = cells[y * cols + x];
              if (!cc.settled) {
                if (now >= cc.nextFlip) {
                  cc.on = Math.random() < 0.5;
                  cc.nextFlip =
                    now +
                    FLICKER_MIN +
                    Math.random() * (FLICKER_MAX - FLICKER_MIN);
                }
                if (elapsed >= cc.settleAt) {
                  cc.settled = true;
                  cc.on = cc.isTarget;
                } else {
                  allSettled = false;
                }
              }
              if (cc.on) {
                ctx.fillRect(
                  originX + x * CELL + inset,
                  originY + y * CELL + inset,
                  block,
                  block,
                );
              }
            }
          }
          if (!xShown && allSettled) {
            xShown = true;
            if (xLink) xLink.classList.add("show");
          }
          requestAnimationFrame(frame);
        }

        addEventListener("resize", init);
        document.fonts.ready.then(() => {
          init();
          requestAnimationFrame(frame);
        });
      })();
    </script>
  </body>
</html>
