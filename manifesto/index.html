<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manifesto — Null Order</title>
<meta name="description" content="The Manifesto of Null Order — The Foundation for the Unbound.">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="apple-touch-icon" href="../nullorder.png">
<meta property="og:title" content="Manifesto — Null Order">
<meta property="og:description" content="The Foundation for the Unbound. Null is Not Empty.">
<meta property="og:image" content="../og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Manifesto — Null Order">
<meta name="twitter:description" content="The Foundation for the Unbound. Null is Not Empty.">
<meta name="twitter:image" content="../og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#000;font-family:'Silkscreen',monospace;color:#fff;line-height:1.7}
  *{box-sizing:border-box}

  .wrap{max-width:720px;margin:0 auto;padding:60px 24px 80px}

  /* Back link */
  .back{display:inline-block;margin-bottom:48px;color:#555;text-decoration:none;font-size:16px;letter-spacing:1px}
  .back:hover{color:#fff}

  /* Title block — the centered HTML from the markdown */
  #content p[align="center"]{text-align:center;margin-bottom:56px}
  #content p[align="center"] strong em{font-size:26px;letter-spacing:6px;text-transform:uppercase}
  #content p[align="center"] em{font-size:16px;color:#0f0;text-shadow:0 0 8px rgba(0,255,0,.3)}

  /* Horizontal rules */
  hr{border:none;border-top:1px solid #222;margin:48px 0}

  /* Section headings */
  h2{font-size:18px;letter-spacing:4px;text-transform:uppercase;color:#0f0;text-shadow:0 0 8px rgba(0,255,0,.3);margin:0 0 24px}

  /* Article headings */
  h3{font-size:16px;letter-spacing:2px;color:#fff;margin:32px 0 12px}

  /* Body text */
  p{font-size:15px;color:#ccc;margin:0 0 16px}

  /* Blockquotes */
  blockquote{border-left:2px solid #444;margin:24px 0;padding:8px 0 8px 20px}
  blockquote p{color:#fff;font-size:15px;margin:0 0 8px}
  blockquote p:last-child{margin:0}

  /* Strong text in body */
  strong{color:#fff}

  /* Responsive */
  @media(max-width:480px){
    .wrap{padding:40px 16px 60px}
    #content p[align="center"] strong em{font-size:20px;letter-spacing:4px}
    h2{font-size:16px}
    h3{font-size:15px}
    p,blockquote p{font-size:14px}
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">&larr; NULLORDER</a>
  <div id="content"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  fetch('../MANIFESTO.md')
    .then(r => r.text())
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
    });
</script>
</body>
</html>
